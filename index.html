<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オートチャイムシステム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .clock-font {
            font-family: 'Courier New', Courier, monospace;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans text-slate-800 p-4 md:p-8">
    <div class="max-w-4xl mx-auto space-y-6">
        
        <!-- ヘッダー -->
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-600 flex justify-center items-center gap-2">
                <i data-lucide="bell-ring" class="w-8 h-8"></i>
                オートチャイムシステム
            </h1>
            <p class="text-slate-500 mt-2">設定した時刻になると自動でチャイムが鳴ります</p>
        </header>

        <!-- メイン時計＆コントロール -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 text-center relative overflow-hidden">
            <!-- 背景の装飾 -->
            <div class="absolute top-0 right-0 -mt-4 -mr-4 text-slate-100 opacity-50 pointer-events-none">
                <i data-lucide="clock" class="w-48 h-48"></i>
            </div>

            <div class="relative z-10">
                <div id="clock" class="text-7xl md:text-9xl font-bold text-slate-800 tracking-wider clock-font mb-4">
                    00:00:00
                </div>
                
                <div class="bg-blue-50 text-blue-800 inline-block px-4 py-2 rounded-full font-medium mb-8 border border-blue-100">
                    <span id="next-chime-info">次のチャイム: 計算中...</span>
                </div>

                <div class="flex flex-col sm:flex-row justify-center items-center gap-4">
                    <button id="toggle-system" class="w-full sm:w-auto px-8 py-4 rounded-full font-bold text-white transition-all shadow-md bg-green-500 hover:bg-green-600 flex justify-center items-center gap-2 text-lg">
                        <i data-lucide="play" class="w-6 h-6"></i>
                        チャイムシステムを開始
                    </button>
                    <button id="test-audio" class="w-full sm:w-auto px-6 py-4 rounded-full font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors flex justify-center items-center gap-2 text-lg border border-slate-200">
                        <i data-lucide="volume-2" class="w-6 h-6"></i>
                        テスト再生
                    </button>
                </div>
                
                <div id="system-status" class="mt-4 text-sm text-red-500 hidden bg-red-50 p-3 rounded-md border border-red-100 inline-block">
                    <i data-lucide="alert-circle" class="w-4 h-4 inline mr-1"></i>
                    ブラウザの制限により音声が再生できませんでした。「テスト再生」を一度クリックしてください。
                </div>
            </div>
        </div>

        <!-- スケジュール設定 -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-2 text-slate-700">
                <i data-lucide="calendar-clock" class="w-6 h-6"></i>
                時間割・休憩の設定
            </h2>
            
            <!-- 追加フォーム -->
            <form id="add-form" class="flex flex-col md:flex-row gap-4 mb-8 bg-slate-50 p-5 rounded-xl border border-slate-200">
                <div class="flex-1">
                    <label class="block text-sm font-bold text-slate-700 mb-1">名称 (例: 1時間目, 昼休み)</label>
                    <input type="text" id="input-name" required placeholder="例: 1時間目" class="w-full rounded-lg border-slate-300 shadow-sm p-3 border focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>
                <div class="w-full md:w-40">
                    <label class="block text-sm font-bold text-slate-700 mb-1">開始時刻</label>
                    <input type="time" id="input-start" class="w-full rounded-lg border-slate-300 shadow-sm p-3 border focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>
                <div class="w-full md:w-40">
                    <label class="block text-sm font-bold text-slate-700 mb-1">終了時刻</label>
                    <input type="time" id="input-end" class="w-full rounded-lg border-slate-300 shadow-sm p-3 border focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>
                <div class="flex items-end">
                    <button type="submit" class="w-full md:w-auto bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition-colors shadow-sm font-bold flex justify-center items-center gap-2">
                        <i data-lucide="plus" class="w-5 h-5"></i> 追加
                    </button>
                </div>
            </form>

            <p class="text-sm text-slate-500 mb-3">※開始時刻・終了時刻のいずれか一方のみの設定も可能です。</p>

            <!-- リスト -->
            <div class="overflow-x-auto border border-slate-200 rounded-xl">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-100 border-b border-slate-200">
                            <th class="p-4 font-bold text-slate-700">名称</th>
                            <th class="p-4 font-bold text-slate-700 w-32">開始</th>
                            <th class="p-4 font-bold text-slate-700 w-32">終了</th>
                            <th class="p-4 font-bold text-slate-700 text-center w-24">操作</th>
                        </tr>
                    </thead>
                    <tbody id="schedule-list" class="divide-y divide-slate-100">
                        <!-- JavaScriptで描画されます -->
                    </tbody>
                </table>
            </div>
            
            <div class="mt-6 flex justify-end">
                <button id="reset-default" class="text-sm text-slate-400 hover:text-red-500 transition-colors flex items-center gap-1">
                    <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
                    標準の時間割にリセットする
                </button>
            </div>
        </div>
    </div>

    <!-- 音声ファイル (指定されたURL) -->
    <audio id="chime-audio" src="https://otologic.jp/sounds/se/pre/Japanese_School_Bell02-01(Slow-Long).mp3" preload="auto"></audio>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // アイコンの初期化
            lucide.createIcons();

            // 要素の取得
            const clockEl = document.getElementById('clock');
            const nextChimeEl = document.getElementById('next-chime-info');
            const toggleBtn = document.getElementById('toggle-system');
            const testBtn = document.getElementById('test-audio');
            const statusEl = document.getElementById('system-status');
            const addForm = document.getElementById('add-form');
            const listEl = document.getElementById('schedule-list');
            const audio = document.getElementById('chime-audio');
            const resetBtn = document.getElementById('reset-default');

            // 状態管理
            let isSystemActive = false;
            let lastPlayedTime = ""; // 重複再生防止用 "HH:MM"
            let schedules = [];

            // 標準の時間割データ
            const defaultSchedules = [
                { id: 1, name: "1時間目", start: "08:45", end: "09:35" },
                { id: 2, name: "2時間目", start: "09:45", end: "10:35" },
                { id: 3, name: "3時間目", start: "10:45", end: "11:35" },
                { id: 4, name: "4時間目", start: "11:45", end: "12:35" },
                { id: 5, name: "昼休み",   start: "12:35", end: "13:20" },
                { id: 6, name: "5時間目", start: "13:20", end: "14:10" },
                { id: 7, name: "6時間目", start: "14:20", end: "15:10" },
            ];

            // データの読み込み
            function loadSchedules() {
                const saved = localStorage.getItem('chimeSchedules');
                if (saved) {
                    schedules = JSON.parse(saved);
                } else {
                    schedules = [...defaultSchedules];
                    saveSchedules();
                }
                renderSchedules();
                updateNextChimeInfo();
            }

            // データの保存
            function saveSchedules() {
                localStorage.setItem('chimeSchedules', JSON.stringify(schedules));
            }

            // スケジュール表の描画
            function renderSchedules() {
                listEl.innerHTML = '';
                if (schedules.length === 0) {
                    listEl.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-slate-400">設定されたスケジュールはありません。<br>上のフォームから追加してください。</td></tr>';
                    return;
                }

                // 時間順に並び替え
                const sorted = [...schedules].sort((a, b) => {
                    const timeA = a.start || a.end || "23:59";
                    const timeB = b.start || b.end || "23:59";
                    return timeA.localeCompare(timeB);
                });

                sorted.forEach(s => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-50 transition-colors";
                    tr.innerHTML = `
                        <td class="p-4 font-medium text-slate-800">${escapeHtml(s.name)}</td>
                        <td class="p-4 font-mono text-lg text-slate-600">${s.start || '<span class="text-slate-300">-</span>'}</td>
                        <td class="p-4 font-mono text-lg text-slate-600">${s.end || '<span class="text-slate-300">-</span>'}</td>
                        <td class="p-4 text-center">
                            <button class="delete-btn text-slate-400 hover:text-red-500 hover:bg-red-50 p-2 rounded-lg transition-colors" data-id="${s.id}" title="削除">
                                <i data-lucide="trash-2" class="w-5 h-5 mx-auto"></i>
                            </button>
                        </td>
                    `;
                    listEl.appendChild(tr);
                });
                lucide.createIcons();

                // 削除ボタンのイベント付与
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = parseInt(e.currentTarget.getAttribute('data-id'));
                        schedules = schedules.filter(s => s.id !== id);
                        saveSchedules();
                        renderSchedules();
                        updateNextChimeInfo();
                    });
                });
            }

            // XSS対策
            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>'"]/g, tag => ({
                    '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
                }[tag]));
            }

            // スケジュールの追加
            addForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const name = document.getElementById('input-name').value;
                const start = document.getElementById('input-start').value;
                const end = document.getElementById('input-end').value;

                if (!start && !end) {
                    alert('開始時刻または終了時刻のいずれかを入力してください。');
                    return;
                }

                schedules.push({
                    id: Date.now(),
                    name,
                    start,
                    end
                });

                saveSchedules();
                renderSchedules();
                updateNextChimeInfo();
                
                // フォームを空にする
                document.getElementById('input-name').value = '';
                document.getElementById('input-start').value = '';
                document.getElementById('input-end').value = '';
                document.getElementById('input-name').focus();
            });

            // 初期化ボタン
            resetBtn.addEventListener('click', () => {
                if(confirm('現在の設定をすべて消去し、標準の時間割に戻しますか？')) {
                    schedules = [...defaultSchedules];
                    saveSchedules();
                    renderSchedules();
                    updateNextChimeInfo();
                }
            });

            // 時計の更新とチャイム判定
            function updateClock() {
                const now = new Date();
                const h = String(now.getHours()).padStart(2, '0');
                const m = String(now.getMinutes()).padStart(2, '0');
                const s = String(now.getSeconds()).padStart(2, '0');
                const timeStr = `${h}:${m}`;
                
                clockEl.textContent = `${timeStr}:${s}`;

                // システム稼働中で、まだこの分に鳴らしていなければ判定
                if (isSystemActive && lastPlayedTime !== timeStr) {
                    checkChime(timeStr);
                }
            }

            // チャイムを鳴らすべきか判定
            function checkChime(currentHM) {
                let shouldPlay = false;

                for (const s of schedules) {
                    if (s.start === currentHM || s.end === currentHM) {
                        shouldPlay = true;
                        break;
                    }
                }

                if (shouldPlay) {
                    playAudio();
                    lastPlayedTime = currentHM;
                    // チャイムが鳴った後、少し待ってから「次のチャイム」表示を更新
                    setTimeout(updateNextChimeInfo, 60000); 
                }
            }

            // 音声再生処理
            function playAudio() {
                audio.currentTime = 0;
                const playPromise = audio.play();
                
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        // 再生成功時はエラーメッセージを隠す
                        statusEl.classList.add('hidden');
                    }).catch(error => {
                        console.error("再生に失敗しました:", error);
                        // ブラウザ制限などで再生できなかった場合
                        statusEl.classList.remove('hidden');
                        setSystemActive(false);
                    });
                }
            }

            // 次のチャイム時刻を計算して表示
            function updateNextChimeInfo() {
                const now = new Date();
                const currentMins = now.getHours() * 60 + now.getMinutes();
                
                let upcoming = [];
                schedules.forEach(s => {
                    if (s.start) {
                        const [h, m] = s.start.split(':').map(Number);
                        upcoming.push({ time: s.start, name: s.name + " 開始", mins: h * 60 + m });
                    }
                    if (s.end) {
                        const [h, m] = s.end.split(':').map(Number);
                        upcoming.push({ time: s.end, name: s.name + " 終了", mins: h * 60 + m });
                    }
                });

                // 現在時刻より未来のチャイムを抽出
                let futureChimes = upcoming.filter(c => c.mins > currentMins);
                
                if (futureChimes.length > 0) {
                    futureChimes.sort((a, b) => a.mins - b.mins);
                    const next = futureChimes[0];
                    nextChimeEl.innerHTML = `<span class="font-bold">次のチャイム</span>: 今日 ${next.time} (${next.name})`;
                } else if (upcoming.length > 0) {
                    // 今日のチャイムが全て終わっている場合は明日の最初を表示
                    upcoming.sort((a, b) => a.mins - b.mins);
                    const next = upcoming[0];
                    nextChimeEl.innerHTML = `<span class="font-bold">次のチャイム</span>: 明日 ${next.time} (${next.name})`;
                } else {
                    nextChimeEl.textContent = "設定されたチャイムはありません";
                }
            }

            // システムのON/OFF切り替え
            function setSystemActive(active) {
                isSystemActive = active;
                if (active) {
                    // 稼働中
                    toggleBtn.innerHTML = '<i data-lucide="square" class="w-6 h-6"></i> システム稼働中 (クリックで停止)';
                    toggleBtn.classList.remove('bg-green-500', 'hover:bg-green-600');
                    toggleBtn.classList.add('bg-red-500', 'hover:bg-red-600', 'animate-pulse');
                    
                    // ブラウザの制限を解除するために一度音声をロードさせる
                    audio.load();
                } else {
                    // 停止中
                    toggleBtn.innerHTML = '<i data-lucide="play" class="w-6 h-6"></i> チャイムシステムを開始';
                    toggleBtn.classList.remove('bg-red-500', 'hover:bg-red-600', 'animate-pulse');
                    toggleBtn.classList.add('bg-green-500', 'hover:bg-green-600');
                    audio.pause();
                }
                lucide.createIcons();
            }

            // イベントリスナー
            toggleBtn.addEventListener('click', () => {
                setSystemActive(!isSystemActive);
            });

            testBtn.addEventListener('click', () => {
                playAudio();
            });

            // 初期処理
            loadSchedules();
            setInterval(updateClock, 1000); // 1秒ごとに時計更新
            updateClock();
        });
    </script>
</body>
</html>
